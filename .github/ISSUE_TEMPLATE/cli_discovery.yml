name: CLI Discovery Or Install Path
description: Report a provider CLI that works in Terminal but is missing or degraded in Tokenmon.
title: "[Discovery]: "
labels:
  - provider-discovery
body:
  - type: markdown
    attributes:
      value: |
        Use this when Tokenmon cannot find a CLI that works in your shell. Do not paste prompts, responses, tokens, or private secrets.
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Claude
        - Codex
        - Gemini
        - Cursor
        - Other
    validations:
      required: true
  - type: dropdown
    id: installer
    attributes:
      label: Install Method
      options:
        - Homebrew
        - npm
        - pnpm
        - bun
        - mise
        - asdf
        - volta
        - Manual install
        - Other
    validations:
      required: true
  - type: input
    id: command_v
    attributes:
      label: Terminal Lookup Result
      description: Paste the output path from `command -v <tool>`, if available.
      placeholder: /Users/me/.local/share/mise/shims/codex
  - type: input
    id: gui_launch
    attributes:
      label: Tokenmon Launch Method
      placeholder: Finder, Dock, login item, Terminal, or source build
  - type: textarea
    id: tokenmon_status
    attributes:
      label: Tokenmon Status
      description: What does Tokenmon show for this provider?
    validations:
      required: true
  - type: textarea
    id: path_details
    attributes:
      label: Path Details
      description: List relevant install directories only. Redact usernames or private paths if needed.
      placeholder: |
        ~/.local/share/mise/shims/codex
        ~/.local/share/mise/installs/node/24.12.0/bin/codex
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy Check
      options:
        - label: I did not include prompt text, model response text, API keys, or private machine-local secrets.
          required: true
