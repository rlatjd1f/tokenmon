name: Bug Report
description: Report a reproducible problem in the public Tokenmon app, docs, tests, or release surface.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a Tokenmon bug. Do not include prompts, model responses, API keys, private repo paths, or machine-local secrets.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
      placeholder: Tokenmon shows Codex as unavailable even though the CLI is installed.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: List the smallest sequence that reproduces the issue.
      placeholder: |
        1. Install Tokenmon ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: tokenmon_version
    attributes:
      label: Tokenmon Version
      placeholder: v0.1.32
  - type: input
    id: macos_version
    attributes:
      label: macOS Version
      placeholder: macOS 15.4
  - type: textarea
    id: verification
    attributes:
      label: Local Checks
      description: If you built from source, paste the command names and pass/fail status only.
      placeholder: |
        swift build: pass
        ./scripts/ai-verify --mode pr: pass
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy Check
      options:
        - label: I did not include prompt text, model response text, API keys, or private machine-local secrets.
          required: true
