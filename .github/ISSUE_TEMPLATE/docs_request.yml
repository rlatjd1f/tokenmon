name: Docs Request
description: Request a public documentation improvement.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: docs_area
    attributes:
      label: Docs Area
      description: Which README, guide, release note, or setup flow is unclear?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What were you trying to do, and where did the docs fail?
    validations:
      required: true
  - type: textarea
    id: suggested_change
    attributes:
      label: Suggested Change
      description: Optional wording, links, screenshots, or examples.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy Check
      options:
        - label: I did not include prompt text, model response text, API keys, or private machine-local secrets.
          required: true
